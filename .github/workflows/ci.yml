name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Every test module imports only stdlib + repo-local modules, so pytest is
      # the sole dependency. A new third-party import needs a requirements file
      # and a change here.
      - name: Install pytest
        run: python3 -m pip install --disable-pip-version-check pytest

      # Bare `pytest` — discovery is the source of truth, so a test file is never
      # named in an arg list and cannot be orphaned by omission. Necessary but not
      # sufficient: a test_*.py defining no `test_*` item is imported, contributes
      # zero tests, and passes silently.
      - name: Run pytest
        run: python3 -m pytest -q

      # Excluded from pytest collection (self-contained, exits at import), so it
      # is run explicitly here. Excluded from the collector, never from CI.
      - name: Run qc_label_audit self-contained checks
        run: python3 qc_label_audit/test_qc_label_audit.py
